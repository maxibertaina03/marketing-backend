services:
  postgres:
    image: postgres:16-alpine
    container_name: contentos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contentos
      POSTGRES_PASSWORD: contentos
      POSTGRES_DB: contentos
    ports:
      - '5432:5432'
    volumes:
      - datos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U contentos -d contentos']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  datos_postgres:
